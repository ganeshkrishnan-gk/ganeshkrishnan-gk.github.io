<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>GK | Security Portfolio</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Segoe UI',sans-serif;background:#0a0f2c;color:#fff;min-height:100vh;}

  /* NAV */
  nav{display:flex;justify-content:space-between;align-items:center;padding:20px 60px;position:fixed;width:100%;top:0;z-index:100;background:rgba(10,15,44,.85);backdrop-filter:blur(8px);border-bottom:1px solid rgba(255,255,255,.08);}
  .logo{font-size:1.6rem;font-weight:700;color:#fff;}
  .logo span{color:#e63946;}
  .nav-links a{color:#ddd;text-decoration:none;margin-left:28px;font-size:.95rem;transition:.2s;}
  .nav-links a:hover{color:#e63946;}

  /* HERO */
  .hero{min-height:100vh;display:flex;align-items:center;padding:0 60px;position:relative;overflow:hidden;}

  /* Background image via JS-injected inline style */
  .hero-bg{position:absolute;inset:0;background-size:cover;background-position:center;background-repeat:no-repeat;z-index:0;}
  .hero-overlay{position:absolute;inset:0;background:linear-gradient(135deg,rgba(5,8,30,.88) 50%,rgba(10,20,70,.55) 100%);z-index:1;}

  .hero-text{z-index:2;position:relative;max-width:520px;}
  .hero-text p{font-size:1.1rem;color:#aab4d8;margin-bottom:8px;}
  .hero-text h1{font-size:3.2rem;font-weight:800;line-height:1.15;margin-bottom:8px;}
  .hero-text h1 span{color:#e63946;}
  .hero-text h2{font-size:1.4rem;font-weight:400;color:#aab4d8;margin-bottom:30px;}
  .hero-text h2 strong{color:#e63946;font-weight:700;}
  .btn-contact{display:inline-block;padding:13px 34px;background:#e63946;color:#fff;border-radius:5px;font-size:1rem;font-weight:600;text-decoration:none;transition:.2s;}
  .btn-contact:hover{background:#c1121f;}

  /* STATS */
  .stats{display:flex;gap:40px;margin-top:40px;}
  .stat h3{font-size:2rem;font-weight:800;color:#e63946;}
  .stat p{font-size:.8rem;color:#aab4d8;margin-top:2px;}

  /* SCROLL HINT */
  .scroll-hint{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:6px;color:#aab4d8;font-size:.8rem;z-index:2;}
  .scroll-dot{width:8px;height:8px;border-radius:50%;background:#e63946;animation:bounce 1.4s infinite;}
  @keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(8px);}}
</style>
</head>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-0LJ47VHBTR"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-0LJ47VHBTR');
</script>
<body>

<nav>
  <div class="logo">Port<span>fo</span>lio.</div>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="resources.html">Resources</a>
    <a href="blog.html">Blog</a>
  </div>
</nav>

<section class="hero" id="hero">
  <div class="hero-bg" id="heroBg"></div>
  <div class="hero-overlay"></div>

  <div class="hero-text">
    <p>Hello, my name is</p>
    <h1>Ganesh Krishnan</h1>
    <h2>And I'm an <strong>Information Security Professional</strong></h2>
    <a href="https://www.linkedin.com/in/kg13/" target="_blank" class="btn-contact">Contact Me</a>
    <div class="stats">
      <div class="stat"><h3>15+</h3><p>Years Experience</p></div>
      <div class="stat"><h3>15+</h3><p>Certifications</p></div>
      <div class="stat"><h3>4+</h3><p>Companies</p></div>
    </div>
  </div>

  <div class="scroll-hint">
    <span>Scroll</span>
    <div class="scroll-dot"></div>
  </div>
</section>

<script>
  // Load the image uploaded by the user and set as background
  const bg = document.getElementById('heroBg');
  const sources = [
    'img/hero-bg.jpg',
  ];

  function tryLoad(i){
    if(i >= sources.length) return;
    const img = new Image();
    img.onload = () => { bg.style.backgroundImage = `url('${sources[i]}')`; };
    img.onerror = () => tryLoad(i+1);
    img.src = sources[i];
  }
  tryLoad(0);
</script>
</body>
</html>
