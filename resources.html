<script>
const resources = [
  {
    id:1, category:'firewall', icon:'🔥', title:'Palo Alto Firewall – Quick Reference',
    tag:'Firewall', desc:'Core concepts, zone-based policies, security profiles and best practices for Palo Alto NGFW.',
    readTime:'8 min read', pdfUrl:'#',
    content:`
      <h3>Overview</h3>
      <p>Palo Alto Networks NGFW uses a zone-based security model where all traffic must be explicitly allowed by a Security Policy rule. Traffic flows between zones (e.g., Trust → Untrust).</p>
      <h3>Key Concepts</h3>
      <ul>
        <li><strong>Zones:</strong> Logical groupings of interfaces. Traffic between same-zone interfaces is allowed by default.</li>
        <li><strong>Security Profiles:</strong> Antivirus, Anti-Spyware, Vulnerability Protection, URL Filtering, File Blocking, WildFire.</li>
        <li><strong>App-ID:</strong> Identifies applications regardless of port or protocol.</li>
        <li><strong>User-ID:</strong> Maps IP addresses to usernames for identity-based policies.</li>
      </ul>
      <h3>Best Practices</h3>
      <ul>
        <li>Always apply Security Profiles to rules allowing traffic from untrusted zones.</li>
        <li>Use application-based rules (App-ID) instead of port-based rules.</li>
        <li>Enable logging on all deny rules for forensic visibility.</li>
        <li>Regularly review and clean up unused policies and objects.</li>
      </ul>
      <h3>Useful CLI Commands</h3>
      <ul>
        <li><code>show session all</code> – View active sessions</li>
        <li><code>test security-policy-match</code> – Verify policy match</li>
        <li><code>show counter global</code> – System-wide packet counters</li>
      </ul>`
  },
  {
    id:2, category:'firewall', icon:'🛡️', title:'Checkpoint Firewall – Admin Notes',
    tag:'Firewall', desc:'SmartConsole, rulebase order, NAT configuration, and SIC troubleshooting tips.',
    readTime:'10 min read', pdfUrl:'#',
    content:`
      <h3>Overview</h3>
      <p>Checkpoint uses a Management + Gateway architecture. SmartConsole connects to the Management Server which pushes policy to Gateways.</p>
      <h3>Rulebase Order</h3>
      <ul>
        <li>Rules are processed top-to-bottom; place specific rules above general ones.</li>
        <li>Cleanup rule (Any → Any → Drop) should always be the last rule.</li>
        <li>Stealth rule (protect mgmt access) should be near the top.</li>
      </ul>
      <h3>NAT Tips</h3>
      <ul>
        <li>Manual NAT rules take precedence over Automatic NAT.</li>
        <li>Use Hide NAT for outbound traffic, Static NAT for inbound servers.</li>
      </ul>
      <h3>SIC Troubleshooting</h3>
      <ul>
        <li>Run <code>cpconfig</code> on gateway to reset SIC.</li>
        <li>Re-initialize from SmartConsole → Gateway Properties → Communication.</li>
      </ul>`
  },
  {
    id:3, category:'vpn', icon:'🔐', title:'IPSec VPN – Complete Guide',
    tag:'VPN', desc:'IKEv1 vs IKEv2, Phase 1 & 2 parameters, troubleshooting common VPN issues.',
    readTime:'12 min read', pdfUrl:'#',
    content:`
      <h3>IPSec Overview</h3>
      <p>IPSec operates in two modes: Transport (protects payload) and Tunnel (protects entire packet). Site-to-site VPNs almost always use Tunnel mode.</p>
      <h3>IKE Phase 1 (ISAKMP SA)</h3>
      <ul>
        <li>Establishes a secure channel for negotiation.</li>
        <li>Parameters: Encryption (AES-256), Hash (SHA-256), DH Group (14+), Lifetime.</li>
        <li>Authentication: Pre-shared key or certificates.</li>
      </ul>
      <h3>IKE Phase 2 (IPSec SA)</h3>
      <ul>
        <li>Negotiates actual data encryption parameters.</li>
        <li>Parameters: ESP/AH, Encryption, Hash, PFS, Lifetime, Proxy IDs (interesting traffic).</li>
      </ul>
      <h3>Common Issues</h3>
      <ul>
        <li><strong>Phase 1 failure:</strong> Mismatched encryption/hash/DH or PSK.</li>
        <li><strong>Phase 2 failure:</strong> Mismatched proxy IDs (interesting traffic ACL).</li>
        <li><strong>Routing:</strong> Ensure return traffic is routed back through the VPN interface.</li>
        <li><strong>NAT-T:</strong> Enable if either peer is behind NAT (UDP 4500).</li>
      </ul>`
  },
  {
    id:4, category:'cloud', icon:'☁️', title:'Zscaler ZIA – Architecture & Config',
    tag:'Cloud Security', desc:'Understanding Zscaler Internet Access: tunnelling, PAC files, SSL inspection, and policy design.',
    readTime:'9 min read', pdfUrl:'#',
    content:`
      <h3>ZIA Architecture</h3>
      <p>Zscaler Internet Access (ZIA) is a cloud-native proxy. Traffic is forwarded to Zscaler PoPs via GRE/IPSec tunnels or Zscaler Client Connector (ZCC).</p>
      <h3>Traffic Forwarding Methods</h3>
      <ul>
        <li><strong>GRE Tunnel:</strong> Preferred for branch/HQ, forwards all ports.</li>
        <li><strong>IPSec Tunnel:</strong> Alternative to GRE with encryption overhead.</li>
        <li><strong>PAC File:</strong> Browser-based forwarding, limited to HTTP/HTTPS.</li>
        <li><strong>ZCC (Client Connector):</strong> Agent-based, best for remote users.</li>
      </ul>
      <h3>SSL Inspection</h3>
      <ul>
        <li>Install the Zscaler root CA on all endpoints.</li>
        <li>Define SSL bypass rules for banking, healthcare, and certificate-pinned apps.</li>
        <li>Monitor decryption failures in ZIA Admin Portal.</li>
      </ul>
      <h3>Policy Design Tips</h3>
      <ul>
        <li>Use URL categories + Cloud App Control for application-level visibility.</li>
        <li>Apply DLP policies to prevent data exfiltration via cloud apps.</li>
        <li>Enable Advanced Threat Protection (ATP) on all traffic.</li>
      </ul>`
  },
  {
    id:5, category:'zerotrust', icon:'🔒', title:'Zero Trust Architecture – Principles',
    tag:'Zero Trust', desc:'Never trust, always verify. Core pillars, implementation framework, and practical steps.',
    readTime:'7 min read', pdfUrl:'#',
    content:`
      <h3>What is Zero Trust?</h3>
      <p>Zero Trust is a security model based on the principle of maintaining strict access controls and not trusting anyone by default, even those inside the network perimeter.</p>
      <h3>Core Pillars</h3>
      <ul>
        <li><strong>Identity:</strong> Verify every user and device before granting access (MFA, conditional access).</li>
        <li><strong>Devices:</strong> Ensure device health and compliance before allowing access.</li>
        <li><strong>Network:</strong> Micro-segmentation, encrypted communications, deny-by-default.</li>
        <li><strong>Applications:</strong> Application-layer access control, not network-layer.</li>
        <li><strong>Data:</strong> Classify, label, and protect data with DLP and encryption.</li>
      </ul>
      <h3>Implementation Steps</h3>
      <ul>
        <li>Identify your protect surface (data, assets, applications, services).</li>
        <li>Map transaction flows to understand how data moves.</li>
        <li>Architect a Zero Trust network around the protect surface.</li>
        <li>Create Zero Trust policies using least-privilege access.</li>
        <li>Monitor and maintain the environment continuously.</li>
      </ul>`
  },
  {
    id:6, category:'general', icon:'📋', title:'CISSP – Domain Quick Reference',
    tag:'General Security', desc:'Key concepts across all 8 CISSP domains for quick revision and interview prep.',
    readTime:'15 min read', pdfUrl:'#',
    content:`
      <h3>Domain Overview</h3>
      <p>The CISSP CBK covers 8 domains. Here are the key themes to remember for each:</p>
      <h3>Domain Highlights</h3>
      <ul>
        <li><strong>D1 – Security & Risk Management:</strong> CIA triad, risk frameworks (NIST, ISO 27001), legal/compliance.</li>
        <li><strong>D2 – Asset Security:</strong> Data classification, ownership, retention, handling.</li>
        <li><strong>D3 – Security Architecture:</strong> Design principles, security models (Bell-LaPadula, Biba), trusted computing.</li>
        <li><strong>D4 – Communication & Network Security:</strong> OSI model, protocols, firewalls, VPNs, wireless security.</li>
        <li><strong>D5 – Identity & Access Management:</strong> Authentication, authorisation, federated identity, PAM.</li>
        <li><strong>D6 – Security Assessment & Testing:</strong> Penetration testing, vulnerability assessments, auditing.</li>
        <li><strong>D7 – Security Operations:</strong> Incident response, forensics, BCP/DRP, logging, monitoring.</li>
        <li><strong>D8 – Software Development Security:</strong> SDLC, secure coding, code review, DevSecOps.</li>
      </ul>`
  }
];

function renderCards(filter='all'){
  const grid=document.getElementById('resourceGrid');
  grid.innerHTML='';
  resources.filter(r=>filter==='all'||r.category===filter).forEach(r=>{
    const card=document.createElement('div');
    card.className='resource-card';
    card.innerHTML=`
      <div class="card-thumb ${r.category}">${r.icon}</div>
      <div class="card-body">
        <span class="card-tag">${r.tag}</span>
        <h3>${r.title}</h3>
        <p>${r.desc}</p>
        <div class="card-meta">
          <span><i class="far fa-clock"></i> ${r.readTime}</span>
          <a class="read-btn" href="#" onclick="openModal(${r.id});return false;">Read Now →</a>
        </div>
      </div>`;
    grid.appendChild(card);
  });
}

function filterCards(cat,btn){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderCards(cat);
}

function openModal(id){
  const r=resources.find(x=>x.id===id);
  document.getElementById('modalContent').innerHTML=`
    <h2>${r.title}</h2>
    <span class="modal-tag">${r.tag}</span>
    <div class="modal-content">${r.content}</div>
    ${r.pdfUrl!=='#'?`<a href="${r.pdfUrl}" target="_blank" class="modal-pdf-link"><i class="fas fa-file-pdf"></i> Download PDF</a>`:''}`;
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeModal(e){if(e.target===document.getElementById('modalOverlay'))closeModalBtn();}
function closeModalBtn(){document.getElementById('modalOverlay').classList.remove('open');document.body.style.overflow='';}

renderCards();
</script>
